<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خطأ {{ status_code }} — Smart Spreadsheet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Noto Sans Arabic', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
  <div class="text-center p-8">
    <div class="text-8xl font-black text-slate-800 mb-4">{{ status_code }}</div>
    <h1 class="text-2xl font-bold text-white mb-3">
      {% if status_code == 404 %}الصفحة غير موجودة
      {% elif status_code == 401 %}يجب تسجيل الدخول
      {% elif status_code == 403 %}غير مصرح لك
      {% else %}خطأ في الخادم{% endif %}
    </h1>
    <p class="text-slate-400 mb-8">{{ message }}</p>
    <div class="flex justify-center gap-3">
      <a href="/dashboard" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-medium transition-colors text-sm">
        العودة للوحة التحكم
      </a>
      <a href="javascript:history.back()" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-medium transition-colors text-sm">
        الصفحة السابقة
      </a>
    </div>
  </div>
</body>
</html>
